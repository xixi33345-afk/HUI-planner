<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f7f7f9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="健康打卡">
  <title>健康打卡</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Chart.js：本地优先，CDN 多级降级（jsdelivr → bootcdn → unpkg） -->
  <script src="js/vendor/chart.umd.min.js"></script>
  <script>window.Chart || document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>')</script>
  <script>window.Chart || document.write('<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"><\/script>')</script>
  <script>window.Chart || document.write('<script src="https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>')</script>
  <!-- LeanCloud Storage SDK：本地优先，CDN 多级降级 -->
  <script src="js/vendor/av-min.js"></script>
  <script>window.AV || document.write('<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.15.2/dist/av-min.js"><\/script>')</script>
  <script>window.AV || document.write('<script src="https://unpkg.com/leancloud-storage@4.15.2/dist/av-min.js"><\/script>')</script>
</head>
<body>
<div id="app">

  <!-- ===== APP HEADER ===== -->
  <header id="appHeader">
    <div class="header-top">
      <div id="syncStatus" class="offline" title="云同步状态">
        <span class="sync-dot"></span>
        <span id="syncStatusText">未连接</span>
      </div>
      <span id="brandPage">仪表盘</span>
      <div id="headerActions">
        <button class="btn-header-action" id="btnReview">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          复盘
        </button>
      </div>
    </div>
  </header>

  <!-- ===== SUB TABS (segmented, below header) ===== -->
  <div id="subTabs"></div>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="appMain"></main>

  <!-- ===== BOTTOM MAIN NAV ===== -->
  <nav id="appNav">
    <button class="tab-item main-tab active" data-main="health"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></span><span class="tab-label">健康</span></button>
    <button class="tab-item main-tab" data-main="planner"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="m9 12 2 2 4-4"/></svg></span><span class="tab-label">任务</span></button>
    <button class="tab-item main-tab" data-main="profile"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="tab-label">我的</span></button>
  </nav>

  <!-- ===== TIMER PILL ===== -->
  <div id="timerPill" style="display:none"></div>

  <!-- ===== MODAL ===== -->
  <div id="modalBackdrop"></div>
  <div id="modalSheet">
    <div id="modalBody"></div>
  </div>

</div><!-- #app -->

<!-- SVG defs for diet progress ring gradient -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="dietGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
</svg>

<!-- JS: load order matters -->
<script src="js/cloud-config.js"></script>
<script src="js/foods.js"></script>
<script src="js/planner.js"></script>
<script src="js/health.js"></script>
<script src="js/ai-plan.js"></script>
<script src="js/app.js"></script>
<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
